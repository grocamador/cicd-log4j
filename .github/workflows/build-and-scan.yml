name: Build and Scan Container Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-options: image=moby/buildkit:latest

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: log4j-app:latest
          no-cache: true

      - name: Scan image with CrowdStrike Falcon Container Scanner
        uses: CrowdStrike/fcs-action@v1
        with:
          image: log4j-app:latest
          falcon_client_id: ${{ secrets.FALCON_CLIENT_ID }}
          falcon_client_secret: ${{ secrets.FALCON_CLIENT_SECRET }}

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: falcon-scan-results
          path: falcon-scan-results.json
