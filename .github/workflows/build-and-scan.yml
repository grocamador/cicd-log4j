name: Build and Scan Container Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    environment: FCS-CRWD

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Compile with Maven
        run: |
          cd vulnerable-application
          mvn clean package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-options: image=moby/buildkit:latest

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: log4j-app:latest
          no-cache: true

      - name: Scan Docker image with CrowdStrike Falcon Container Scanner
        uses: crowdstrike/fcs-action@v4.0.0
        with:
          falcon_client_id: ${{ vars.FALCON_CLIENT_ID }}
          falcon_region: 'us-1'
          scan_type: image
          image: log4j-app:latest
          upload_results: true
          minimum_severity: low
          output_path: './falcon-scan-results.json'
          report_formats: json
        env:
          FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: falcon-scan-results
          path: falcon-scan-results.json
