name: Build and Scan Container Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Compile with Maven
        run: |
          cd vulnerable-application
          mvn clean package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-options: image=moby/buildkit:latest

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: log4j-app:latest
          no-cache: true

      - name: Scan with CrowdStrike Falcon Container Scanner
        env:
          CS_USERNAME: ${{ secrets.CS_USERNAME }}
          CS_PASSWORD: ${{ secrets.CS_PASSWORD }}
          CS_REGISTRY: registry.crowdstrike.com
          CS_IMAGE_NAME: registry.crowdstrike.com/fcs/us-1/release/cs-fcs
          CS_IMAGE_TAG: "0.42.0"
          FALCON_REGION: us-1
          FALCON_CLIENT_ID: ${{ secrets.FALCON_CLIENT_ID }}
          FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}
        run: |
          set +x

          # Login to CrowdStrike registry
          echo "Logging in to CrowdStrike registry..."
          echo "$CS_PASSWORD" | docker login "$CS_REGISTRY" --username "$CS_USERNAME" --password-stdin

          # Pull FCS container
          echo "Pulling FCS container..."
          docker pull "$CS_IMAGE_NAME:$CS_IMAGE_TAG"

          # Run IaC scan
          echo "Running FCS IaC scan..."
          docker run --network=host --rm "$CS_IMAGE_NAME:$CS_IMAGE_TAG" \
            --client-id "$FALCON_CLIENT_ID" \
            --client-secret "$FALCON_CLIENT_SECRET" \
            --falcon-region "$FALCON_REGION" \
            iac scan -p "git::https://github.com/grocamador/cicd-log4j.git//kubernetes" \
            --upload-results \
            --fail-on "high=10,medium=70,low=50,info=10" || true

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: falcon-scan-results
          path: falcon-scan-results.json
